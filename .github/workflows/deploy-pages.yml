name: Deploy GitHub Pages (Landing + PWA)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace deps
        run: npm install --no-audit --no-fund

      - name: Build PWA
        run: npm run build:web

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp logo.png _site/
          cp -r apps/web/dist _site/app
          echo "✓ assembled:"
          ls -la _site/
          echo "✓ app/:"
          ls -la _site/app/ | head -15

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
